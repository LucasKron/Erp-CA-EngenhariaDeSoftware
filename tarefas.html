<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas — CA ERP</title>
  <meta name="theme-color" content="#0a0f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Tarefas</h1>
        <p>Gestão de tarefas e responsabilidades do CA</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="abrirModalTarefa()" data-icon="plus">Nova Tarefa</button>
      </div>
    </header>

    <div class="content">
      <!-- Stats -->
      <div class="cards-grid" id="task-stats"></div>

      <!-- Filtros -->
      <div class="table-card" style="margin-bottom:20px;">
        <div style="padding:14px 20px;">
          <div class="filters-row">
            <div class="search-input-wrap" style="flex:1; min-width:180px;">
              <input type="text" class="form-control" id="search-tar" placeholder="Buscar tarefa..." oninput="renderTarefas()">
            </div>
            <select class="form-control" id="filter-status-tar" style="width:auto;" onchange="renderTarefas()">
              <option value="">Todos os status</option>
              <option value="pendente">Pendente</option>
              <option value="andamento">Em andamento</option>
              <option value="concluida">Concluída</option>
              <option value="cancelada">Cancelada</option>
            </select>
            <select class="form-control" id="filter-prio" style="width:auto;" onchange="renderTarefas()">
              <option value="">Todas as prioridades</option>
              <option value="alta">Alta</option>
              <option value="media">Média</option>
              <option value="baixa">Baixa</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Tabela de tarefas -->
      <div class="table-card">
        <div class="table-card-header">
          <h2>Lista de Tarefas</h2>
          <span id="total-tarefas" class="kicker"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th style="width:32px;"></th>
                <th>Tarefa</th>
                <th>Responsável</th>
                <th>Prazo</th>
                <th>Prioridade</th>
                <th>Status</th>
                <th style="text-align:center;">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-tarefas"></tbody>
          </table>
        </div>
        <div id="empty-tarefas" class="hidden">
          <div class="empty-state">
            <div class="empty-state-icon" data-icon="tasks" data-icon-size="40"></div>
            <h3>Nenhuma tarefa encontrada</h3>
            <p>Crie tarefas para delegar e acompanhar as responsabilidades do CA.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Tarefa -->
<div class="modal-backdrop hidden" id="modal-tarefa">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-tar-title">Nova Tarefa</h3>
      <button class="modal-close" onclick="closeModal('modal-tarefa')" data-icon="close" data-icon-size="14"></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-tar-id">

      <div class="form-group">
        <label class="form-label">Título da tarefa <span>*</span></label>
        <input type="text" class="form-control" id="tar-titulo" placeholder="O que precisa ser feito?">
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea class="form-control" id="tar-descricao" rows="2" placeholder="Detalhes da tarefa..."></textarea>
      </div>

      <div class="form-row form-row-2">
        <div class="form-group">
          <label class="form-label">Responsável</label>
          <input type="text" class="form-control" id="tar-responsavel" placeholder="Nome do responsável">
        </div>
        <div class="form-group">
          <label class="form-label">Prazo</label>
          <input type="date" class="form-control" id="tar-prazo">
        </div>
      </div>

      <div class="form-row form-row-2">
        <div class="form-group">
          <label class="form-label">Prioridade</label>
          <select class="form-control" id="tar-prioridade">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="tar-status">
            <option value="pendente">Pendente</option>
            <option value="andamento">Em andamento</option>
            <option value="concluida">Concluída</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-tarefa')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarTarefa()">Salvar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/tarefas.js"></script>
</body>
</html>
