<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — CA ERP</title>
  <meta name="theme-color" content="#0a0f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Painel</h1>
        <p id="topbar-date"></p>
      </div>
      <div class="topbar-right">
        <span id="topbar-greeting" class="kicker"></span>
      </div>
    </header>

    <div class="content">
      <div class="cards-grid" id="stats-grid"></div>

      <div class="panel-grid">
        <div class="table-card">
          <div class="table-card-header">
            <h2>Próximos Eventos</h2>
            <a href="eventos.html" class="btn btn-secondary btn-sm">Ver todos</a>
          </div>
          <div id="upcoming-events"></div>
        </div>
        <div class="table-card">
          <div class="table-card-header">
            <h2>Tarefas Pendentes</h2>
            <a href="tarefas.html" class="btn btn-secondary btn-sm">Ver todas</a>
          </div>
          <div id="pending-tasks"></div>
        </div>
      </div>

      <div class="panel-grid">
        <div class="table-card">
          <div class="table-card-header">
            <h2>Resumo Financeiro</h2>
            <a href="financeiro.html" class="btn btn-secondary btn-sm">Ver detalhes</a>
          </div>
          <div id="finance-summary"></div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><h2>Acesso Rápido</h2></div>
          <div id="quick-actions"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/home.js"></script>
</body>
</html>
