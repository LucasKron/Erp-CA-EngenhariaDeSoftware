<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — CA ERP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Dashboard</h1>
        <p id="topbar-date"></p>
      </div>
      <div class="topbar-right">
        <span id="topbar-greeting" style="font-size:13px; color:#718096;"></span>
      </div>
    </header>

    <div class="content">
      <div class="cards-grid" id="stats-grid"></div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
        <div class="table-card">
          <div class="table-card-header">
            <h2>Próximos Eventos</h2>
            <a href="eventos.html" class="btn btn-secondary btn-sm">Ver todos</a>
          </div>
          <div id="upcoming-events" style="padding:0 0 8px;"></div>
        </div>
        <div class="table-card">
          <div class="table-card-header">
            <h2>Tarefas Pendentes</h2>
            <a href="tarefas.html" class="btn btn-secondary btn-sm">Ver todas</a>
          </div>
          <div id="pending-tasks" style="padding:0 0 8px;"></div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div class="table-card">
          <div class="table-card-header">
            <h2>Resumo Financeiro</h2>
            <a href="financeiro.html" class="btn btn-secondary btn-sm">Ver detalhes</a>
          </div>
          <div style="padding:20px;" id="finance-summary"></div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><h2>Acesso Rápido</h2></div>
          <div style="padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:10px;" id="quick-actions"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/home.js"></script>
</body>
</html>
