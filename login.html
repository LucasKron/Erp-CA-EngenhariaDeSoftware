<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — CA ERP</title>
  <meta name="theme-color" content="#0a0f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="table-card" style="width:100%;max-width:380px;padding:34px">
      <div style="text-align:center;margin-bottom:24px">
        <div id="login-logo" style="display:flex;justify-content:center;margin-bottom:14px"></div>
        <h1 style="font-family:var(--font-display);font-size:22px;color:var(--text)">Painel do CA</h1>
        <p style="color:var(--text-3);font-size:13px;margin-top:2px">Acesso restrito à diretoria</p>
      </div>

      <form id="login-form" onsubmit="return false">
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" id="login-email" placeholder="seu@email.com" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="login-hint" style="font-size:12px;color:var(--text-3);min-height:16px;margin-bottom:12px"></div>
        <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center" onclick="doLogin()">Entrar</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
