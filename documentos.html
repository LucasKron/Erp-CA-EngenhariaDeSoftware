<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos — CA ERP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Documentos</h1>
        <p>Gerencie arquivos e documentos do CA</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('modal-upload')">
          ⬆ Enviar Documento
        </button>
      </div>
    </header>

    <div class="content">
      <!-- Filtros -->
      <div class="table-card" style="margin-bottom:20px;">
        <div style="padding:14px 20px;">
          <div class="filters-row">
            <div class="search-input-wrap" style="flex:1; min-width:200px;">
              <input type="text" class="form-control" id="search-docs" placeholder="Buscar documentos..." oninput="renderDocs()">
            </div>
            <select class="form-control" id="filter-categoria" style="width:auto;" onchange="renderDocs()">
              <option value="">Todas as categorias</option>
              <option>Ata</option>
              <option>Regulamento</option>
              <option>Edital</option>
              <option>Financeiro</option>
              <option>Evento</option>
              <option>Outros</option>
            </select>
            <select class="form-control" id="filter-tipo" style="width:auto;" onchange="renderDocs()">
              <option value="">Todos os tipos</option>
              <option value="pdf">PDF</option>
              <option value="docx">Word</option>
              <option value="xlsx">Excel</option>
              <option value="pptx">PowerPoint</option>
              <option value="imagem">Imagem</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Grid de documentos -->
      <div id="docs-container"></div>
    </div>
  </main>
</div>

<!-- Modal Upload -->
<div class="modal-backdrop hidden" id="modal-upload">
  <div class="modal">
    <div class="modal-header">
      <h3>Enviar Documento</h3>
      <button class="modal-close" onclick="closeModal('modal-upload')">✕</button>
    </div>
    <div class="modal-body">
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-zone-icon">📁</div>
        <p><strong>Clique para selecionar</strong> ou arraste um arquivo aqui</p>
        <p><small>PDF, Word, Excel, PowerPoint, imagens · máx. 10 MB</small></p>
        <div id="file-selected" style="margin-top:12px; font-size:13px; color:#2C3E7A; font-weight:600; display:none;"></div>
      </div>
      <input type="file" id="file-input" style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.txt,.csv,.zip" onchange="onFileSelected(this)">

      <div style="margin-top:16px;">
        <div class="form-group">
          <label class="form-label">Nome do arquivo <span>*</span></label>
          <input type="text" class="form-control" id="doc-nome" placeholder="Ex: Ata Reunião Março 2024">
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label class="form-label">Categoria <span>*</span></label>
            <select class="form-control" id="doc-categoria">
              <option value="">Selecionar...</option>
              <option>Ata</option>
              <option>Regulamento</option>
              <option>Edital</option>
              <option>Financeiro</option>
              <option>Evento</option>
              <option>Outros</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Data do documento</label>
            <input type="date" class="form-control" id="doc-data">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descrição</label>
          <textarea class="form-control" id="doc-descricao" placeholder="Descreva brevemente o conteúdo do documento..." rows="2"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-upload')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarDocumento()">⬆ Salvar Documento</button>
    </div>
  </div>
</div>

<!-- Modal Visualizar -->
<div class="modal-backdrop hidden" id="modal-view">
  <div class="modal">
    <div class="modal-header">
      <h3 id="view-title">Documento</h3>
      <button class="modal-close" onclick="closeModal('modal-view')">✕</button>
    </div>
    <div class="modal-body" id="view-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="view-delete-btn">🗑 Excluir</button>
      <button class="btn btn-outline" onclick="closeModal('modal-view')">Fechar</button>
      <button class="btn btn-primary" id="view-download-btn">⬇ Baixar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/documentos.js"></script>
</body>
</html>
